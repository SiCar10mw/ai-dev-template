name: conformance-audit

on:
  workflow_call:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: read

jobs:
  conformance:
    name: conformance audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: make conformance
      - run: python scripts/check_owasp_llm.py
