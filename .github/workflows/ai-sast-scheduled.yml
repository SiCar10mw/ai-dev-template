name: ai-sast-scheduled

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ai-sast:
    name: AI-SAST scheduled full scan
    runs-on: ubuntu-latest
    env:
      AI_SAST_MAX_FILES: "160"
      AI_SAST_MAX_BYTES_PER_FILE: "60000"
      AI_SAST_MAX_TOTAL_BYTES: "500000"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - name: Run non-blocking full scan
        run: |
          python scripts/check_ai_sast.py \
            --scanner auto \
            --targets . \
            --output ai-sast-findings.json \
            || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-sast-scheduled-findings
          path: ai-sast-findings.json
          if-no-files-found: ignore
      - name: Open triage issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const path = 'ai-sast-findings.json';
            if (!fs.existsSync(path)) {
              return;
            }
            const report = JSON.parse(fs.readFileSync(path, 'utf8'));
            const findings = (report.findings || []).filter((finding) => finding.confirmed);
            if (findings.length === 0) {
              return;
            }
            const lines = findings.slice(0, 20).map((finding) => {
              return `- ${finding.severity.toUpperCase()} ${finding.cwe} ${finding.file}:${finding.line} fingerprint=${finding.fingerprint}`;
            });
            if (findings.length > 20) {
              lines.push(`- ${findings.length - 20} additional confirmed finding(s) omitted from the issue body.`);
            }
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `AI-SAST scheduled triage: ${findings.length} confirmed finding(s)`,
              labels: ['security', 'ai-sast'],
              body: [
                'Scheduled AI-SAST full scan found confirmed findings.',
                '',
                'This scheduled cadence is non-blocking. Humans triage the findings and update code or `.ai-sast-baseline.json` as appropriate.',
                '',
                ...lines,
                '',
                `Workflow run: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`
              ].join('\n')
            });
