name: codeql

on:
  pull_request:
  merge_group:
  push:
    branches: [main]
  schedule:
    - cron: "30 8 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  analyze:
    name: CodeQL analyze
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
