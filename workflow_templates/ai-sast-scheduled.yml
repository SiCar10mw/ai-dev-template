name: ai-sast-scheduled

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  ai-sast:
    name: AI-SAST scheduled full scan
    runs-on: ubuntu-latest
    env:
      AI_SAST_MAX_FILES: "160"
      AI_SAST_MAX_BYTES_PER_FILE: "60000"
      AI_SAST_MAX_TOTAL_BYTES: "500000"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: python scripts/check_ai_sast.py --scanner auto --targets . --output ai-sast-findings.json || true
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ai-sast-scheduled-findings
          path: ai-sast-findings.json
          if-no-files-found: ignore
